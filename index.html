<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f7f3ec" />
  <title>ねこ積み — Nekozumi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand__kanji">ねこ積み</span>
        <span class="brand__sub">NEKOZUMI</span>
      </div>
      <div class="meters">
        <div class="lives" id="lives" aria-label="残機">
          <span class="heart">♥</span><span class="heart">♥</span><span class="heart">♥</span>
        </div>
        <div class="score">
          <span class="score__label">高さ</span>
          <span class="score__value" id="score">0</span>
        </div>
        <div class="score score--hi">
          <span class="score__label">BEST</span>
          <span class="score__value" id="best">0</span>
        </div>
      </div>
    </header>

    <main class="stage">
      <div class="next">
        <span class="next__label">NEXT</span>
        <canvas id="next-canvas" width="64" height="64" aria-hidden="true"></canvas>
        <span class="next__name" id="next-name"></span>
      </div>
      <div class="board" id="board">
        <canvas id="game-canvas" aria-label="ねこ積みのプレイエリア"></canvas>
        <div class="hint" id="hint">ドラッグで狙う・タップで落とす</div>
      </div>
    </main>

    <div class="controls">
      <button class="ctrl ctrl--rot" id="rotL" aria-label="左回転">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 5V2L7 7l5 5V8c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.41 3.59 8 8 8s8-3.59 8-8-3.59-8-8-8z" fill="currentColor"/></svg>
      </button>
      <button class="ctrl ctrl--drop" id="drop-btn">落とす</button>
      <button class="ctrl ctrl--rot" id="rotR" aria-label="右回転">
        <svg viewBox="0 0 24 24" width="22" height="22" style="transform:scaleX(-1)"><path d="M12 5V2L7 7l5 5V8c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.41 3.59 8 8 8s8-3.59 8-8-3.59-8-8-8z" fill="currentColor"/></svg>
      </button>
    </div>

    <div class="modal" id="modal" hidden>
      <div class="modal__panel">
        <div class="modal__title">GAME OVER</div>
        <div class="modal__score">
          <div class="modal__row"><span>到達高さ</span><span id="final-score">0</span></div>
          <div class="modal__row"><span>BEST</span><span id="final-best">0</span></div>
        </div>
        <button class="btn" id="restart">もう一度</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="game.js" defer></script>
</body>
</html>
