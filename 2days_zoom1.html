<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2days実践講座｜第1回 ZOOMアーカイブ</title>
  <style>
    :root {
      --plum:       #8b4c6b;
      --plum-mid:   #a8638a;
      --cream:      #fdf6ef;
      --white:      #ffffff;
      --text:       #3d2e2e;
      --text-mid:   #7a6060;
      --border:     #e8d5dc;
      --shadow:     0 4px 20px rgba(139,76,107,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── ヘッダー ─── */
    .header {
      width: 100%;
      background: linear-gradient(135deg, #7a3d5e 0%, var(--plum-mid) 100%);
      padding: 16px 20px;
      text-align: center;
      color: #fff;
    }
    .header-logo  { font-size: 11px; letter-spacing: 3px; opacity: 0.7; margin-bottom: 4px; }
    .header-title { font-size: 17px; font-weight: 700; }
    .header-sub   { font-size: 11px; opacity: 0.65; margin-top: 3px; }

    /* ─── コンテンツ ─── */
    .main {
      width: 100%;
      max-width: 720px;
      padding: 20px 14px 48px;
    }

    /* ─── タイトルカード ─── */
    .title-card {
      background: var(--white);
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .title-badge {
      background: linear-gradient(135deg, #7a3d5e, var(--plum-mid));
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 20px;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }
    .title-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }

    /* ─── 動画カード ─── */
    .video-card {
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .video-wrap {
      padding: 56.25% 0 0 0; /* 16:9 */
      position: relative;
    }
    .video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* ─── メモカード ─── */
    .note-card {
      background: var(--white);
      border-radius: 14px;
      padding: 16px 18px;
      box-shadow: var(--shadow);
    }
    .note-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--plum);
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .note-list {
      list-style: none;
    }
    .note-list li {
      font-size: 13px;
      color: var(--text-mid);
      line-height: 1.75;
      padding-left: 16px;
      position: relative;
    }
    .note-list li::before {
      content: '•';
      position: absolute;
      left: 4px;
      color: var(--plum);
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">凛 穏 塾</div>
  <div class="header-title">運を自分で創る 2days 実践講座</div>
  <div class="header-sub">ZOOMアーカイブ動画</div>
</div>

<div class="main">

  <div class="title-card">
    <span class="title-badge">第1回</span>
    <span class="title-text">初回 ZOOM講座アーカイブ</span>
  </div>

  <div class="video-card">
    <div class="video-wrap">
      <iframe
        src="https://player.vimeo.com/video/1200889077?title=0&byline=0&portrait=0&badge=0&autopause=0&player_id=0&app_id=58479"
        allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        title="運を自分で創る＿2DAYS講座"
      ></iframe>
    </div>
  </div>

  <div class="note-card">
    <div class="note-title">📝 視聴メモ</div>
    <ul class="note-list">
      <li>Wi-Fi環境での視聴を推奨します</li>
      <li>全画面表示は動画右下のアイコンから</li>
      <li>視聴中はメモをとりながらご覧ください</li>
    </ul>
  </div>

</div>

<script src="https://player.vimeo.com/api/player.js"></script>
</body>
</html>
