<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エルラボ＋｜L-MINE</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/column.css">
<style>
/* ===== 会員動画アプリ（/videos/ と同デザイン：ダーク×ゴールド） ===== */

/* ── ヒーロー（page-head 上書き：videosamune.jpg 背景・画像比率3:1） ── */
.page-head{position:relative;overflow:hidden;height:33.34vw;min-height:210px;max-height:330px;display:grid;place-items:center;padding:24px;text-align:center;border-bottom:none;background:#14141a}
@media(max-width:600px){.page-head{height:auto;min-height:230px;max-height:260px}}
.page-head .ph-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.page-head::before{content:"";position:absolute;inset:0;z-index:1;background:radial-gradient(820px 360px at 50% 50%, rgba(16,16,21,.30), rgba(13,13,18,.74))}
.page-head::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(180deg,rgba(13,13,18,.55),rgba(13,13,18,.28) 42%,rgba(13,13,18,.7))}
.page-head .ph-inner{position:relative;z-index:2}
.page-head .ph-inner .ornament{width:28px;height:1px;background:var(--gold-2);margin:0 auto 13px;opacity:.8}
.page-head .ey{font-family:var(--serif-en);font-size:13px;letter-spacing:.42em;text-transform:uppercase;color:#e8cf98;text-shadow:0 1px 14px rgba(0,0,0,.55)}
.page-head h1{font-family:var(--mincho);font-weight:800;font-size:clamp(26px,4vw,38px);margin-top:11px;letter-spacing:.14em;color:#fff;text-shadow:0 2px 26px rgba(0,0,0,.6)}
.page-head p{color:#ddd6c9;font-size:13px;margin-top:12px;letter-spacing:.04em;line-height:1.85;text-shadow:0 1px 14px rgba(0,0,0,.5)}
.page-head .hr{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold-2),transparent);margin:18px auto 0}

.vlayout{max-width:1140px;margin:0 auto;padding:60px 28px 0;display:grid;grid-template-columns:336px minmax(0,1fr);gap:54px;align-items:start}
@media(max-width:900px){.vlayout{grid-template-columns:1fr;gap:34px;padding-top:38px}}

/* ── 左：コース一覧（アコーディオン） ── */
.vlist{align-self:start}
@media(max-width:900px){.vlist{order:2}}
.vlist .listhead{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--serif-en);font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);padding-bottom:11px;border-bottom:1px solid var(--gold);margin-bottom:2px}
.vlist .listhead .lh-count{font-family:var(--gothic);font-size:11px;letter-spacing:.02em;color:var(--ink-soft);text-transform:none}

/* コース行（第1階層） */
.course{border-bottom:1px solid var(--line);position:relative}
.course-head{width:100%;text-align:left;background:none;border:none;cursor:pointer;font-family:var(--mincho);font-weight:700;color:var(--ink);font-size:14.5px;line-height:1.55;padding:16px 8px 16px 16px;display:flex;gap:12px;align-items:center;transition:color .18s}
.course-head::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:0;background:var(--gold);transition:height .2s}
.course.open>.course-head::before,.course.single.active>.course-head::before{height:62%}
.course-head:hover{color:var(--gold)}
.course-head .c-tw{flex:1}
/* 単発コースは再生ヒント（▷）をホバー表示 */
.course.single .course-head .c-tw::after{content:"▷";font-size:10px;color:var(--line-2);margin-left:9px;vertical-align:1px;transition:color .18s}
.course.single:hover .course-head .c-tw::after,.course.single.active .course-head .c-tw::after{color:var(--gold)}
.course.single.active .course-head{color:var(--gold)}
/* 開閉トグル（丸囲みの＋／−） */
.course-head .c-toggle{font-family:var(--gothic);font-size:13px;line-height:1;color:var(--gold);width:21px;height:21px;border:1px solid var(--line-2);border-radius:50%;display:inline-grid;place-items:center;transition:.2s;flex:none}
.course.open .course-head .c-toggle{background:var(--gold);color:#fff;border-color:var(--gold)}
.course-head .c-lock{color:var(--gold);font-size:13px}
.course-head .c-tag{font-size:10px;font-weight:400;letter-spacing:.04em;color:var(--ink-soft);border:1px solid var(--line-2);border-radius:999px;padding:2px 9px;white-space:nowrap;font-family:var(--gothic)}

/* 章リスト（第2階層・展開部）— 左に細い背骨ライン */
.chapters{display:none;margin:0 0 8px;padding:4px 0 4px 16px;border-left:1px solid var(--line-2);margin-left:7px}
.course.open .chapters{display:block}
.chapter{width:100%;text-align:left;background:none;border:none;cursor:pointer;font-family:var(--gothic);color:var(--ink-2);font-size:13px;line-height:1.65;padding:9px 6px 9px 12px;display:flex;gap:11px;align-items:flex-start;position:relative;transition:color .18s}
.chapter::before{content:"";position:absolute;left:-17px;top:50%;transform:translateY(-50%) scale(0);width:7px;height:7px;border-radius:50%;background:var(--gold);transition:transform .2s}
.chapter:hover{color:var(--gold)}
.chapter.active{color:var(--gold);font-weight:700}
.chapter.active::before{transform:translateY(-50%) scale(1)}
.chapter .ch-no{font-family:var(--serif-en);font-size:12px;color:var(--ink-soft);min-width:18px;padding-top:1px}
.chapter.active .ch-no{color:var(--gold)}
.chapter .ch-t{flex:1}

/* ── 右：プレイヤー ── */
.vplayer{align-self:start}
@media(max-width:900px){.vplayer{order:1}}
.vframe{position:relative;aspect-ratio:16/9;background:#0f0f14;border:1px solid var(--line-2);border-radius:7px;overflow:hidden;box-shadow:0 28px 56px -30px rgba(16,16,24,.55),0 6px 16px -10px rgba(16,16,24,.3)}
.vframe iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}
.vmeta{margin-top:26px}
.vmeta .np{font-family:var(--serif-en);font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:10px}
.vmeta .np::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px rgba(168,132,63,.16)}
.vmeta .kick{font-family:var(--gothic);font-size:12.5px;letter-spacing:.05em;color:var(--ink-soft);margin-top:13px}
.vmeta h1{font-family:var(--mincho);font-weight:800;font-size:clamp(21px,3vw,28px);line-height:1.5;color:var(--ink);margin-top:9px}
.vmeta .vfiled{margin-top:18px;padding-top:15px;border-top:1px solid var(--line-2);display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);min-height:1px}
.vmeta .vfiled a.col-link{color:var(--ink-2);border-bottom:1px solid var(--line-2);padding-bottom:2px;font-size:12px}
.vmeta .vfiled a.col-link:hover{color:var(--gold);border-color:var(--gold)}

/* ヘッダーナビ（公式サイト準拠の9項目） */
.masthead .nav{gap:18px;font-size:13px;flex-wrap:wrap;justify-content:flex-end}
.masthead .nav a.login{color:var(--gold);border:1px solid var(--gold);border-radius:999px;padding:5px 16px}
.masthead .nav a.login:hover{background:var(--gold);color:#fff;border-color:var(--gold)}

/* 🔒 登録が必要です画面（フェーズ②でログイン判定に差し替え） */
.lockscreen{position:absolute;inset:0;z-index:2;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;padding:30px;background:linear-gradient(rgba(17,17,20,.86),rgba(17,17,20,.9));color:#fff}
.vframe.locked .lockscreen{display:flex}
.lockscreen .lk-ico{font-size:30px}
.lockscreen .lk-t{font-family:var(--mincho);font-weight:700;font-size:18px;line-height:1.6}
.lockscreen .lk-d{font-size:12.5px;color:#e7e2d8;line-height:1.9;max-width:380px}
.lockscreen .lk-btn{margin-top:6px;display:inline-block;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--gold-2),var(--gold));padding:11px 26px;border-radius:999px;letter-spacing:.04em}
.lockscreen .lk-btn:hover{filter:brightness(1.06)}

/* ローディング／エラー表示 */
.vstate{color:var(--ink-soft);font-size:13px;padding:18px 4px;line-height:1.8}

/* ログインモーダル */
.loginmodal{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(16,16,21,.55)}
.loginmodal[hidden]{display:none}
.lm-card{position:relative;background:var(--paper);border:1px solid var(--line-2);border-radius:10px;max-width:380px;width:100%;padding:34px 30px 30px;box-shadow:0 30px 70px -30px rgba(16,16,24,.5)}
.lm-x{position:absolute;top:10px;right:14px;background:none;border:none;font-size:22px;line-height:1;color:var(--ink-soft);cursor:pointer}
.lm-x:hover{color:var(--gold)}
.lm-h{font-family:var(--mincho);font-weight:700;font-size:20px;color:var(--ink);margin-bottom:8px}
.lm-p{font-size:12.5px;color:var(--ink-2);line-height:1.8;margin-bottom:18px}
.lm-card input{width:100%;padding:12px 14px;border:1px solid var(--line-2);border-radius:7px;font-size:14px;font-family:var(--gothic);color:var(--ink);margin-bottom:14px}
.lm-card input:focus{outline:none;border-color:var(--gold)}
.lm-go{width:100%;padding:12px;border:none;border-radius:999px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--gold-2),var(--gold));cursor:pointer;letter-spacing:.04em}
.lm-go:hover{filter:brightness(1.05)}
.lm-msg{font-size:12px;color:var(--gold);margin-top:12px;min-height:1em;text-align:center;line-height:1.6}

/* アプリ内セクションメニュー（将来の拡張・準備中つき） */
.appmenu{max-width:1140px;margin:0 auto;padding:20px 28px 0;display:flex;gap:4px;flex-wrap:wrap;justify-content:center;border-bottom:1px solid var(--line)}
@media(max-width:640px){.appmenu{justify-content:flex-start;flex-wrap:nowrap;overflow-x:auto}}
.am-item{position:relative;font-family:var(--gothic);font-size:13.5px;letter-spacing:.04em;color:var(--ink-2);padding:12px 16px;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s;cursor:pointer}
.am-item:hover{color:var(--gold)}
.am-item.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:700}
.am-item.soon{color:var(--ink-soft);cursor:default}
.am-item.soon:hover{color:var(--ink-soft)}
.am-item .soon-tag{font-size:9px;letter-spacing:.06em;color:#fff;background:var(--line-2);border-radius:999px;padding:1px 6px;margin-left:6px;vertical-align:1.5px}
/* トースト（準備中の通知） */
.toast{position:fixed;left:50%;bottom:36px;transform:translateX(-50%) translateY(18px);background:var(--ink);color:#fff;font-size:12.5px;padding:11px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:.25s;z-index:200;box-shadow:0 14px 34px -14px rgba(0,0,0,.55)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ① 初回ゲート（ENTRY） ── */
.entry{position:fixed;inset:0;z-index:150;display:flex;align-items:center;justify-content:center;text-align:center;padding:28px;background:#12121a;overflow:hidden}
.entry[hidden]{display:none}
.entry-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:.5}
.entry::after{content:"";position:absolute;inset:0;z-index:1;background:radial-gradient(720px 460px at 50% 45%, rgba(12,12,18,.5), rgba(9,9,13,.92))}
.entry-inner{position:relative;z-index:2;max-width:440px}
.entry-mark{font-family:var(--serif-en);font-size:13px;letter-spacing:.4em;text-transform:uppercase;color:#e8cf98;margin-bottom:14px}
.entry-brand{font-family:var(--mincho);font-weight:800;font-size:clamp(32px,7vw,46px);letter-spacing:.12em;color:#fff;text-shadow:0 2px 26px rgba(0,0,0,.6)}
.brand-plus{font-size:.42em;vertical-align:0.9em;color:var(--gold-2);font-weight:700;margin-left:1px}
.appbar-brand .brand-plus{font-size:.5em;vertical-align:0.75em;color:var(--gold)}
.entry-lead{color:#dbd4c6;font-size:13.5px;line-height:1.9;margin:18px 0 32px;text-shadow:0 1px 12px rgba(0,0,0,.55)}
.entry-btns{display:flex;flex-direction:column;gap:12px;max-width:300px;margin:0 auto}
.entry-login{padding:15px;border:none;border-radius:999px;font-size:15px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--gold-2),var(--gold));cursor:pointer;letter-spacing:.05em}
.entry-login:hover{filter:brightness(1.07)}
.entry-guest{padding:13px;border:1px solid rgba(255,255,255,.35);border-radius:999px;font-size:14px;color:#fff;background:transparent;cursor:pointer;letter-spacing:.05em;transition:.15s}
.entry-guest:hover{border-color:var(--gold-2);color:var(--gold-2)}

/* ── ② アプリ上部バー（サイトのヘッダーは廃止・自己完結） ── */
.appbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 24px;background:var(--paper);border-bottom:1px solid var(--line-2)}
.appbar-brand{font-family:var(--mincho);font-weight:800;font-size:18px;letter-spacing:.06em;color:var(--ink)}
.appbar-right{display:flex;align-items:center;gap:14px}
.member-ctl{font-family:var(--gothic);font-size:13px;color:var(--gold);border:1px solid var(--gold);background:transparent;border-radius:999px;padding:7px 17px;cursor:pointer;white-space:nowrap;transition:.15s}
.member-ctl:hover{background:var(--gold);color:#fff}
.member-exit{font-family:var(--gothic);font-size:12.5px;color:var(--ink-soft);border:none;background:none;cursor:pointer;padding:6px 6px}
.member-exit:hover{color:var(--gold)}
.vlayout{padding-top:34px}

/* ── 下部ナビ（タスクアプリ風：アイコン＋ラベル） ── */
#library{padding-bottom:66px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:62px;background:var(--paper);border-top:1px solid var(--line-2);z-index:100;display:flex;justify-content:center;align-items:stretch;box-shadow:0 -2px 14px rgba(20,20,26,.07)}
.bottom-nav .nav-item{flex:1;max-width:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--ink-soft);transition:color .2s;position:relative;font-family:var(--gothic)}
.bottom-nav .nav-item:hover{color:var(--gold)}
.bottom-nav .nav-item.active{color:var(--gold)}
.bottom-nav .nav-item.active::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:30px;height:2.5px;background:var(--gold);border-radius:0 0 2px 2px}
.bottom-nav .nav-item.soon{color:#c8c3b6;cursor:default}
.bottom-nav .nav-item.soon:hover{color:#c8c3b6}
.bottom-nav .nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.bottom-nav .nav-icon svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.bottom-nav .nav-label{font-size:10px;font-weight:600;letter-spacing:.02em;display:flex;align-items:center;gap:4px;white-space:nowrap}
.bottom-nav .nav-label .soon-tag{font-size:8px;font-weight:400;color:#fff;background:var(--line-2);border-radius:999px;padding:1px 5px;letter-spacing:.03em;margin-left:2px}

/* ── お知らせパネル ── */
.newsmodal{position:fixed;inset:0;z-index:190;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;background:rgba(16,16,21,.55);overflow:auto}
.newsmodal[hidden]{display:none}
.news-card{position:relative;background:var(--paper);border:1px solid var(--line-2);border-radius:10px;max-width:560px;width:100%;padding:26px 28px 30px;box-shadow:0 30px 70px -30px rgba(16,16,24,.5)}
.news-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;border-bottom:1px solid var(--gold);padding-bottom:10px}
.news-new{font-size:12px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--gold-2),var(--gold));border:none;border-radius:999px;padding:7px 15px;cursor:pointer}
.news-list{display:flex;flex-direction:column}
.news-item{padding:15px 2px;border-bottom:1px solid var(--line)}
.ni-date{font-family:var(--serif-en);font-size:12px;color:var(--gold);letter-spacing:.06em}
.ni-title{font-family:var(--mincho);font-weight:700;font-size:15.5px;color:var(--ink);margin:4px 0 6px}
.ni-body{font-size:13px;color:var(--ink-2);line-height:1.9;word-break:break-word}
.ni-body a{color:var(--gold);border-bottom:1px solid var(--line-2)}
.ni-admin{display:flex;gap:8px;margin-top:10px}
.ni-admin button{font-size:11px;color:var(--ink-soft);border:1px solid var(--line-2);background:none;border-radius:6px;padding:4px 12px;cursor:pointer}
.ni-admin button:hover{color:var(--gold);border-color:var(--gold)}
.news-form{margin-top:16px;padding-top:16px;border-top:1px dashed var(--line-2);display:flex;flex-direction:column;gap:4px}
.news-form[hidden]{display:none}
.news-form label{font-size:11.5px;color:var(--ink-soft);margin-top:8px}
.news-form input[type=text],.news-form input[type=date],.news-form textarea{width:100%;padding:9px 11px;border:1px solid var(--line-2);border-radius:6px;font-size:13px;font-family:var(--gothic);color:var(--ink)}
.news-form textarea{resize:vertical}
.news-form input:focus,.news-form textarea:focus{outline:none;border-color:var(--gold)}
.nf-check{flex-direction:row;display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2);margin-top:12px}
.nf-check input{width:auto}
.nf-btns{display:flex;gap:10px;margin-top:14px}
.nf-save{flex:1;padding:11px;border:none;border-radius:999px;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--gold-2),var(--gold));cursor:pointer}
.nf-cancel{padding:11px 18px;border:1px solid var(--line-2);border-radius:999px;font-size:13px;color:var(--ink-2);background:none;cursor:pointer}
</style>
</head>
<body>
<!-- ① 初回ゲート（ログイン / ゲスト参加） -->
<section class="entry" id="entry">
  <img class="entry-bg" src="assets/videosamune.jpg" alt="">
  <div class="entry-inner">
    <div class="entry-mark">L-MINE</div>
    <div class="entry-brand">エルラボ<span class="brand-plus">＋</span></div>
    <p class="entry-lead">ログインして続きから、<br>またはゲストとして無料コンテンツを視聴できます。</p>
    <div class="entry-btns">
      <button class="entry-login" id="entryLogin">ログイン</button>
      <button class="entry-guest" id="entryGuest">ゲストで参加</button>
    </div>
  </div>
</section>

<!-- ② コンテンツ格納ページ（ライブラリ） -->
<div id="library" hidden>
<header class="appbar">
  <div class="appbar-brand">エルラボ<span class="brand-plus">＋</span></div>
  <div class="appbar-right">
    <button class="member-exit" id="exitBtn" hidden>退室</button>
    <button class="member-ctl" id="memberBtn">ログイン</button>
  </div>
</header>

<div class="vlayout">
  <!-- 左：コース一覧 -->
  <aside class="vlist">
    <div class="listhead"><span>Courses</span><span class="lh-count" id="lhCount"></span></div>
    <div id="vcourses"><div class="vstate" id="vstate">コースを読み込み中…</div></div>
  </aside>

  <!-- 右：プレイヤー -->
  <main class="vplayer">
    <div class="vframe" id="vframe">
      <iframe id="viframe" src="" title="動画プレイヤー" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
      <div class="lockscreen">
        <div class="lk-ico">🔒</div>
        <div class="lk-t" id="lkTitle">この講座の視聴には登録が必要です</div>
        <div class="lk-d" id="lkDesc">こちらは会員限定の講座です。ご登録いただくと視聴できます。</div>
        <a class="lk-btn" id="lkbtn" href="https://l-mine.com/onlinecourse" target="_blank" rel="noopener">今すぐ登録する →</a>
      </div>
    </div>
    <div class="vmeta">
      <div class="np">Now Playing</div>
      <div class="kick" id="vkick">Course</div>
      <h1 id="vtitle">コースを選択してください</h1>
      <div class="vfiled" id="vfiled"></div>
    </div>
  </main>
</div>

<!-- 下部ナビ（タスクアプリ風メニュー：アイコン＋ラベル） -->

/* =========================================================
   会員動画アプリ（データ駆動版）
   ・コース一覧は data/courses.json から読み込む
   ・コースを追加＝ courses.json に1件足すだけ（コード変更不要）
   ・将来：DATA_URL をGoogleスプレッドシートのJSON/CSV出力に差し替えれば「シート更新→反映」に
   ・locked:true のコースは🔒。今は「登録が必要」画面（フェーズ②でログイン判定に差し替え）

const SHEET_ID     = "1OhHer1LIF0BmcDaeV2G5e8TVkDB_XQFZzuEcz3sJkT4"; // 「L-MINE 動画コース管理（会員アプリ用）」

const REGISTER_URL = "https://l-mine.com/onlinecourse";
const platLabel    = { vimeo:"Vimeo", youtube:"YouTube" };
function embedUrl(v){
  if(v.platform === "vimeo")   return "https://player.vimeo.com/video/" + v.id;
  if(v.platform === "youtube") return "https://www.youtube.com/embed/" + v.id;
  return "";
}

/* ===== 会員ログイン＋視聴権判定（②GAS門番と連携） ===== */

const SESSION_KEY = "lmine_member";
const GUEST_KEY   = "lmine_guest";
let SESSION   = null;             // { email, name, tags:[], active }
let curCourse = null, curVideo = null;

function loadSession(){
  try { SESSION = JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); } catch(e){ SESSION = null; }
  updateMemberUI();
}
function saveSession(s){ SESSION = s; localStorage.setItem(SESSION_KEY, JSON.stringify(s)); updateMemberUI(); }
function clearSession(){ SESSION = null; localStorage.removeItem(SESSION_KEY); updateMemberUI(); }

function updateMemberUI(){
  const btn  = document.getElementById("memberBtn");
  const exit = document.getElementById("exitBtn");
  if(!btn) return;
  if(SESSION && SESSION.email){
    btn.textContent = (SESSION.name || "会員") + "｜ログアウト";
    if(exit) exit.hidden = true;         // 会員はログアウトが退室を兼ねる
  } else {
    btn.textContent = "ログイン";
    if(exit) exit.hidden = false;        // ゲストは「退室」を表示
  }
}

// ① ゲート ⇄ ② ライブラリ の切り替え
function enterLibrary(){
  document.getElementById("entry").hidden   = true;
  document.getElementById("library").hidden = false;
}
function exitToEntry(){
  clearSession();
  localStorage.removeItem(GUEST_KEY);
  document.getElementById("library").hidden = true;
  document.getElementById("entry").hidden   = false;
  render();
}
function initEntry(){
  const isMember = !!(SESSION && SESSION.email);
  const isGuest  = localStorage.getItem(GUEST_KEY) === "1";
  if(isMember || isGuest) enterLibrary();   // 既に入っている人はゲートを飛ばす
}

// このコースを視聴できるか？
function hasAccess(course){
  if(!course.locked) return true;                    // 無料
  if(!SESSION || !SESSION.active) return false;      // 未ログイン or 契約無効
  if(!course.requiredTag) return true;               // 会員なら誰でも（タグ指定なし）
  return (SESSION.tags || []).includes(course.requiredTag);
}

// ロック画面の内容を状態で出し分け
function setLockScreen(course){
  const t = document.getElementById("lkTitle");
  const d = document.getElementById("lkDesc");
  const b = document.getElementById("lkbtn");
  if(!SESSION || !SESSION.email){
    t.textContent = "会員ログインが必要です";
    d.textContent = "ご登録済みのメールアドレスでログインすると視聴できます。";
    b.textContent = "ログイン →";
    b.removeAttribute("target"); b.setAttribute("href", "#");
    b.onclick = (ev) => { ev.preventDefault(); openLogin(); };
  } else if(!SESSION.active){
    t.textContent = "ご契約が有効ではありません";
    d.textContent = "サブスクのご契約状態をご確認ください。";
    b.textContent = "登録・更新する →";
    b.onclick = null; b.setAttribute("target", "_blank"); b.href = course.registerUrl || REGISTER_URL;
  } else {
    t.textContent = "このコースの視聴権がありません";
    d.textContent = "対象の講座をご購入・ご登録いただくと視聴できます。";
    b.textContent = "今すぐ登録する →";
    b.onclick = null; b.setAttribute("target", "_blank"); b.href = course.registerUrl || REGISTER_URL;
  }
}

// ログイン処理（GASで照合）
async function doLogin(){
  const emailEl = document.getElementById("lmEmail");
  const msg     = document.getElementById("lmMsg");
  const email   = (emailEl.value || "").trim().toLowerCase();
  if(!email || email.indexOf("@") < 0){ msg.textContent = "メールアドレスを入力してください。"; return; }
  msg.textContent = "確認中…";
  try {
    const res = await fetch(GAS_URL + "?action=verify&email=" + encodeURIComponent(email)).then(r => r.json());
    if(res.ok){
      saveSession({ email, name: res.name, tags: res.tags || [], active: res.active });
      msg.textContent = "";
      closeLogin();
      enterLibrary();
      render();
      if(curCourse != null) select(curCourse, curVideo);
    } else {
      msg.textContent = (res.error === "not_member")
        ? "このメールアドレスは会員リストに見つかりませんでした。"
        : "ログインできませんでした。";
    }
  } catch(e){
    msg.textContent = "通信エラーが発生しました。時間をおいて再度お試しください。";
  }
}

function openLogin(){

/* ===== お知らせ（管理者はadminタグで投稿/編集/削除・URL自動リンク） ===== */
function isAdmin(){ return !!(SESSION && (SESSION.tags || []).includes("admin")); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
function linkify(s){ return escapeHtml(s).replace(/(https?:\/\/[^\s<]+)/g, u=>`<a href="${u}" target="_blank" rel="noopener">${u}</a>`).replace(/\n/g,"<br>"); }
function fmtNewsDate(s){ if(!s) return ""; const d=new Date(s); if(isNaN(d.getTime())) return String(s); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

async function loadNews(){
  const list = document.getElementById("newsList");
  list.innerHTML = `<div class="vstate">読み込み中…</div>`;
  try{
    const data  = await fetch(GAS_URL + "?action=news&_=" + Date.now()).then(r=>r.json());
    const items = (data && data.items) || [];
    if(!items.length){ list.innerHTML = `<div class="vstate">お知らせはまだありません。</div>`; return; }
    list.innerHTML = "";
    items.forEach(n => list.appendChild(newsItemEl(n)));
  }catch(e){ list.innerHTML = `<div class="vstate">お知らせを読み込めませんでした。</div>`; }
}
function newsItemEl(n){
  const el = document.createElement("div"); el.className = "news-item";
  el.innerHTML = `<div class="ni-date">${escapeHtml(fmtNewsDate(n.date))}</div><div class="ni-title">${escapeHtml(n.title)}</div><div class="ni-body">${linkify(n.body)}</div>`;
  if(isAdmin()){
    const bar = document.createElement("div"); bar.className = "ni-admin";
    const be = document.createElement("button"); be.textContent = "編集"; be.onclick = ()=>editNews(n);
    const bd = document.createElement("button"); bd.textContent = "削除"; bd.onclick = ()=>delNews(n);
    bar.appendChild(be); bar.appendChild(bd); el.appendChild(bar);
  }
  return el;
}
function newNews(){ document.getElementById("nf-id").value=""; document.getElementById("nf-date").value=todayStr(); document.getElementById("nf-title").value=""; document.getElementById("nf-body").value=""; document.getElementById("nf-pub").checked=true; showNewsForm(); }
function editNews(n){ document.getElementById("nf-id").value=n.id; document.getElementById("nf-date").value=n.date; document.getElementById("nf-title").value=n.title; document.getElementById("nf-body").value=n.body; document.getElementById("nf-pub").checked=true; showNewsForm(); document.getElementById("newsForm").scrollIntoView({behavior:"smooth"}); }
async function saveNews(){
  const msg = document.getElementById("nfMsg");
  if(!document.getElementById("nf-title").value.trim()){ msg.textContent="見出しを入力してください。"; return; }
  const id = document.getElementById("nf-id").value;
  const body = new URLSearchParams({
    action: id ? "news_edit" : "news_add",
    email: (SESSION && SESSION.email) || "",
    id, date: document.getElementById("nf-date").value,
    title: document.getElementById("nf-title").value,
    text: document.getElementById("nf-body").value,
    pub: document.getElementById("nf-pub").checked ? "TRUE" : "FALSE"
  });
  msg.textContent = "保存中…";
  try{
    const res = await fetch(GAS_URL, { method:"POST", body }).then(r=>r.json());
    if(res.ok){ hideNewsForm(); loadNews(); } else { msg.textContent = res.error==="not_admin" ? "管理者権限がありません。" : "保存できませんでした。"; }
  }catch(e){ msg.textContent = "通信エラーが発生しました。"; }
}
async function delNews(n){
  if(!confirm("このお知らせを削除しますか？")) return;
  const body = new URLSearchParams({ action:"news_del", email:(SESSION && SESSION.email) || "", id:n.id });
  try{ const res = await fetch(GAS_URL, { method:"POST", body }).then(r=>r.json()); if(res.ok) loadNews(); }catch(e){}
}

async function loadCourses(){
  try {
    COURSES = await fetchFromSheet();
    if(!COURSES.length) throw new Error("シートが空");
  } catch(e1){
    console.warn("スプシ読込み不可 → JSONにフォールバック:", e1.message);
    try {
      const data = await fetch(DATA_URL, {cache:"no-store"}).then(r=>r.json());
      COURSES = (data && data.courses) ? data.courses : [];
    } catch(e2){

    }

  render();
  select(0, 0);

// Googleスプレッドシートのgvizレスポンスを COURSES 構造へ変換
async function fetchFromSheet(){
  const txt  = await fetch(SHEET_URL, {cache:"no-store"}).then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); });
  const json = JSON.parse(txt.replace(/^[^{]*/, "").replace(/;?\s*$/, ""));   // JSONP風ラッパーを除去
  return coursesFromGviz(json);
}

// gviz JSON → COURSES（列は見出し名で解決＝順番が変わってもOK／並び順で整列）
function coursesFromGviz(json){
  const table = json.table || {};
  const cols  = (table.cols || []).map(c => String(c.label || "").trim());
  const find  = (names, fb) => { for(const n of names){ const i = cols.indexOf(n); if(i >= 0) return i; } return fb; };
  const iName  = find(["コース名"], 0);
  const iTitle = find(["章タイトル","タイトル"], 1);
  const iUrl   = find(["動画URL","URL","動画"], 2);
  const iKind  = find(["種別","公開","公開状態"], 3);
  const iTag   = find(["必要タグ","タグ"], 4);
  const iOrder = find(["並び順","順番","順","order"], 5);

  const cell = (r,i)=> (i >= 0 && r.c && r.c[i] && r.c[i].v != null) ? String(r.c[i].v).trim() : "";
  const map  = new Map();   // コース名 → コースオブジェクト
  let seq = 0;
  (table.rows || []).forEach(r => {
    const cname = cell(r,iName), title = cell(r,iTitle), url = cell(r,iUrl);
    if(!cname || !url || cname === "コース名") return;        // 見出し・空行スキップ
    const pv = parseVideoUrl(url);
    if(!pv) return;
    const kind = cell(r,iKind), tag = cell(r,iTag);
    const on   = parseFloat(cell(r,iOrder));
    const ord  = isNaN(on) ? (++seq) : on;
    if(!map.has(cname)){
      map.set(cname, { name:cname, tier:(kind||"無料"), locked:(kind.indexOf("会員")>=0||kind.indexOf("有料")>=0), requiredTag:(tag||null), _order:Infinity, videos:[] });
    }
    const c = map.get(cname);
    c.videos.push({ t:title||cname, platform:pv.platform, id:pv.id, _order:ord });
    if(ord < c._order) c._order = ord;
  });
  const list = [...map.values()];
  list.forEach(c => c.videos.sort((a,b)=> a._order - b._order));   // 章を並び順で整列
  list.sort((a,b)=> a._order - b._order);                          // コースも並び順で整列
  return list;
}

// URL / 埋め込みコード / ID から platform と id を抽出（URLを貼るだけでOKにする）
function parseVideoUrl(s){
  s = String(s).trim();
  let m;
  if((m = s.match(/player\.vimeo\.com\/video\/(\d+)/))) return { platform:"vimeo",   id:m[1] };
  if((m = s.match(/vimeo\.com\/(?:video\/)?(\d+)/)))    return { platform:"vimeo",   id:m[1] };
  if((m = s.match(/youtu\.be\/([\w-]{6,})/)))           return { platform:"youtube", id:m[1] };
  if((m = s.match(/youtube\.com\/embed\/([\w-]{6,})/))) return { platform:"youtube", id:m[1] };
  if((m = s.match(/[?&]v=([\w-]{6,})/)))                return { platform:"youtube", id:m[1] };
  if(/^\d+$/.test(s))                                   return { platform:"vimeo",   id:s };   // 数字のみ＝Vimeo ID
  if(/^[\w-]{6,}$/.test(s))                             return { platform:"youtube", id:s };   // 英数字＝YouTube ID
  return null;
}

function showState(msg){
  wrap.innerHTML = `<div class="vstate">${msg}</div>`;
}

// ---- リスト描画 ----
function render(){
  wrap.innerHTML = "";
  COURSES.forEach((course, ci) => {
    const multi = (course.videos || []).length > 1;
    const el = document.createElement("section");
    el.className = "course" + (multi ? " multi" : " single");
    el.dataset.ci = ci;

    const head = document.createElement("button");
    head.className = "course-head";
    const toggle = multi ? `<span class="c-toggle" data-toggle>＋</span>` : "";
    let badge;
    if(course.locked && !hasAccess(course)) badge = `<span class="c-lock">🔒</span>`;
    else if(multi)                          badge = `<span class="c-tag">${course.videos.length}本</span>`;
    else                                    badge = "";
    head.innerHTML = `${toggle}<span class="c-tw">${course.name}</span>${badge}`;
    head.addEventListener("click", () => onCourseClick(ci));
    el.appendChild(head);

    if(multi){
      const chWrap = document.createElement("div");
      chWrap.className = "chapters";
      course.videos.forEach((v, vi) => {
        const ch = document.createElement("button");
        ch.className = "chapter";
        ch.dataset.ci = ci; ch.dataset.vi = vi;
        ch.innerHTML =
          `<span class="ch-no">${String(vi+1).padStart(2,"0")}</span>` +
          `<span class="ch-t">${v.t}</span>`;
        ch.addEventListener("click", () => select(ci, vi));
        chWrap.appendChild(ch);
      });
      el.appendChild(chWrap);
    }
    wrap.appendChild(el);
  });

  courseEls = [...wrap.querySelectorAll(".course")];
  document.getElementById("lhCount").textContent =
    `${COURSES.length}講座・${COURSES.reduce((n,c)=>n+(c.videos?c.videos.length:0),0)}本`;
}

// コース見出しクリック：単発＝即再生 / 複数＝開閉
function onCourseClick(ci){
  const course = COURSES[ci];
  const el = courseEls[ci];
  if(course.videos.length === 1){ select(ci, 0); return; }
  const willOpen = !el.classList.contains("open");
  courseEls.forEach(c => { c.classList.remove("open"); const t=c.querySelector("[data-toggle]"); if(t)t.textContent="＋"; });
  if(willOpen){
    el.classList.add("open");
    const t = el.querySelector("[data-toggle]"); if(t) t.textContent="−";
  }
}

// 動画を選択して再生
function select(ci, vi){
  const course = COURSES[ci];
  if(!course) return;
  const v = course.videos[vi];
  if(!v) return;
  curCourse = ci; curVideo = vi;
  const locked = !hasAccess(course);

  courseEls.forEach(c => c.classList.remove("active"));
  wrap.querySelectorAll(".chapter").forEach(c => c.classList.remove("active"));
  const el = courseEls[ci];
  if(course.videos.length === 1){
    el.classList.add("active");
  } else {
    courseEls.forEach(c => { c.classList.remove("open"); const t=c.querySelector("[data-toggle]"); if(t)t.textContent="＋"; });
    el.classList.add("open");
    const t = el.querySelector("[data-toggle]"); if(t) t.textContent="−";
    const ch = el.querySelector(`.chapter[data-vi="${vi}"]`);
    if(ch) ch.classList.add("active");
  }

  vkick.textContent  = course.videos.length > 1
      ? `${course.name}　|　Lesson ${String(vi+1).padStart(2,"0")}`
      : course.name;
  vtitle.textContent = v.t;

  if(locked){
    vframe.classList.add("locked");
    viframe.src = "";
    setLockScreen(course);
  } else {
    vframe.classList.remove("locked");
    viframe.src = embedUrl(v);
  }

  let meta = "";
  if(v.column) meta += `<a class="col-link" href="${v.column}">補足はこちら →</a>`;
  vfiled.innerHTML = meta;
}
</script>
</body>
</html>
