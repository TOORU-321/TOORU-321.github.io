  <text x="512" y="1110" text-anchor="middle" font-family="Cinzel, Georgia, serif" font-size="82" font-weight="600" fill="#C9A961" letter-spacing="16">RANGER</text>
  <text x="512" y="1170" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="38" font-style="italic" fill="#E8E1CC" opacity="0.7">Exploratrix Feminina</text>
  <text x="512" y="1230" text-anchor="middle" font-family="'Shippori Mincho B1', serif" font-size="30" fill="#E8E1CC" letter-spacing="8">探索士 ・ 女性型</text>
  <text x="512" y="1290" text-anchor="middle" font-family="serif" font-size="18" fill="#E8E1CC" opacity="0.3" letter-spacing="6">— PLACEHOLDER —</text>
