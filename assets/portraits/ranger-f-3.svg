    <path d="M430 460 Q512 442 594 460 L618 500 L406 500 Z" stroke-opacity="0.8"/>
    <path d="M412 500 L612 500" stroke-opacity="0.6"/>
    <path d="M440 490 L584 490" stroke-opacity="0.4"/>
    <ellipse cx="512" cy="580" rx="62" ry="76"/>
