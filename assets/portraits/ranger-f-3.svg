    <!-- Belt -->
    <path d="M410 880 L614 880" stroke-opacity="0.45"/>
    <circle cx="512" cy="880" r="12" stroke-opacity="0.45"/>
    <!-- Compass -->
    <circle cx="630" cy="860" r="34" stroke-width="2.5"/>
    <path d="M630 834 L630 886 M604 860 L656 860" stroke-opacity="0.6" stroke-width="1.5"/>
