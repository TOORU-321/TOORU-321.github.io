<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1365">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F1428"/>
      <stop offset="0.6" stop-color="#1A1F3A"/>
      <stop offset="1" stop-color="#232949"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C9A961" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#C9A961" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1365" fill="url(#bg)"/>
  <rect x="200" y="400" width="624" height="624" fill="url(#glow)"/>
  <rect x="36" y="36" width="952" height="1293" fill="none" stroke="#C9A961" stroke-width="2" stroke-opacity="0.9"/>
  <rect x="52" y="52" width="920" height="1261" fill="none" stroke="#C9A961" stroke-width="1" stroke-opacity="0.35"/>
  <g stroke="#C9A961" stroke-width="2.5" fill="none">
    <path d="M36 96 L36 36 L96 36"/>
    <path d="M988 96 L988 36 L928 36"/>
    <path d="M36 1269 L36 1329 L96 1329"/>
    <path d="M988 1269 L988 1329 L928 1329"/>
  </g>
  <!-- Silhouette: Ranger — explorer hat, compass, map tube -->
  <g stroke="#C9A961" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- Explorer hat -->
    <path d="M420 460 Q512 440 604 460 L630 500 L394 500 Z" stroke-opacity="0.8"/>
    <path d="M400 500 L624 500" stroke-opacity="0.6"/>
    <!-- Hat band -->
    <path d="M410 490 L614 490" stroke-opacity="0.4"/>
    <ellipse cx="512" cy="580" rx="66" ry="76"/>
    <!-- Field jacket -->
    <path d="M390 720 Q430 680 512 680 Q594 680 634 720 L650 970 L374 970 Z" stroke-opacity="0.75"/>
    <!-- Pockets -->
    <rect x="420" y="800" width="70" height="80" stroke-opacity="0.4"/>
    <rect x="534" y="800" width="70" height="80" stroke-opacity="0.4"/>
    <!-- Compass on strap -->
    <circle cx="640" cy="870" r="36" stroke-width="2.5"/>
    <path d="M640 840 L640 900 M610 870 L670 870" stroke-opacity="0.6" stroke-width="1.5"/>
    <path d="M640 840 L652 868 L640 874 L628 868 Z" fill="#C9A961" stroke="none"/>
    <!-- Map tube on other side -->
    <path d="M340 800 L340 970 Q340 990 360 990 L380 990 Q400 990 400 970 L400 800 Z" stroke-opacity="0.6"/>
  </g>
  <text x="512" y="1110" text-anchor="middle" font-family="Cinzel, Georgia, serif" font-size="82" font-weight="600" fill="#C9A961" letter-spacing="16">RANGER</text>
  <text x="512" y="1170" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="38" font-style="italic" fill="#E8E1CC" opacity="0.7">Explorator Masculinus</text>
  <text x="512" y="1230" text-anchor="middle" font-family="'Shippori Mincho B1', serif" font-size="30" fill="#E8E1CC" letter-spacing="8">探索士 ・ 男性型</text>
  <text x="512" y="1290" text-anchor="middle" font-family="serif" font-size="18" fill="#E8E1CC" opacity="0.3" letter-spacing="6">— PLACEHOLDER —</text>
</svg>
